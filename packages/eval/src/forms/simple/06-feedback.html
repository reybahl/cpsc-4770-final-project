<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Share Your Feedback</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    .fg { margin-bottom: 16px; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
    textarea { min-height: 120px; resize: vertical; }
    button { background: #0070f3; color: #fff; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Share Your Feedback</h1>
  <form method="post" action="#">
    <div class="fg">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="fg">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="fg">
      <label for="rating">Overall Rating (1–5)</label>
      <select id="rating" name="rating">
        <option value="">Select rating…</option>
        <option value="5">5 – Excellent</option>
        <option value="4">4 – Good</option>
        <option value="3">3 – Average</option>
        <option value="2">2 – Below Average</option>
        <option value="1">1 – Poor</option>
      </select>
    </div>
    <div class="fg">
      <label for="category">Feedback Category</label>
      <select id="category" name="category">
        <option value="">Select category…</option>
        <option value="product">Product</option>
        <option value="service">Service</option>
        <option value="support">Support</option>
        <option value="website">Website</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="fg">
      <label for="comments">Your Comments</label>
      <textarea id="comments" name="comments" placeholder="Tell us what you think…" required></textarea>
    </div>
    <button type="submit">Submit Feedback</button>
  </form>
</body>
</html>
