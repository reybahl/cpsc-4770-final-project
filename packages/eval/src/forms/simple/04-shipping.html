<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shipping Address</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; }
    .fg { margin-bottom: 16px; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
    button { background: #0070f3; color: #fff; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Shipping Address</h1>
  <form method="post" action="#">
    <div class="fg">
      <label for="recipientName">Recipient Full Name</label>
      <input type="text" id="recipientName" name="recipientName" required>
    </div>
    <div class="fg">
      <label for="streetAddress">Street Address</label>
      <input type="text" id="streetAddress" name="streetAddress" placeholder="123 Main St, Apt 4B" required>
    </div>
    <div class="row3">
      <div class="fg">
        <label for="city">City</label>
        <input type="text" id="city" name="city" required>
      </div>
      <div class="fg">
        <label for="state">State / Province</label>
        <input type="text" id="state" name="state" required>
      </div>
      <div class="fg">
        <label for="zipCode">ZIP / Postal Code</label>
        <input type="text" id="zipCode" name="zipCode" required>
      </div>
    </div>
    <div class="fg">
      <label for="country">Country</label>
      <select id="country" name="country">
        <option value="">Select country…</option>
        <option value="United States">United States</option>
        <option value="Canada">Canada</option>
        <option value="United Kingdom">United Kingdom</option>
        <option value="Australia">Australia</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <button type="submit">Save Address</button>
  </form>
</body>
</html>
