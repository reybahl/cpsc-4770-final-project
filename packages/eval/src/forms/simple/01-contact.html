<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    .fg { margin-bottom: 16px; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
    input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
    textarea { min-height: 100px; resize: vertical; }
    button { background: #0070f3; color: #fff; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #005cd4; }
  </style>
</head>
<body>
  <h1>Contact Us</h1>
  <form method="post" action="#">
    <div class="fg">
      <label for="firstName">First Name</label>
      <input type="text" id="firstName" name="firstName" placeholder="Jane" required>
    </div>
    <div class="fg">
      <label for="lastName">Last Name</label>
      <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
    </div>
    <div class="fg">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="jane@example.com" required>
    </div>
    <div class="fg">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000">
    </div>
    <div class="fg">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
    </div>
    <button type="submit">Send Message</button>
  </form>
</body>
</html>
