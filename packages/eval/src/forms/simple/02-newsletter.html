<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Newsletter Signup</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p  { color: #555; margin-bottom: 24px; font-size: 0.9rem; }
    .fg { margin-bottom: 16px; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
    button { background: #16a34a; color: #fff; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Stay in the Loop</h1>
  <p>Subscribe to receive our latest news and updates.</p>
  <form method="post" action="#">
    <div class="fg">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required>
    </div>
    <div class="fg">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="jane@example.com" required>
    </div>
    <div class="fg">
      <label for="frequency">Email Frequency</label>
      <select id="frequency" name="frequency">
        <option value="">Select frequency…</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>
    <button type="submit">Subscribe</button>
  </form>
</body>
</html>
