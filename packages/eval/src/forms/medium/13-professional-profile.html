<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Professional Profile</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .subtitle { color: #555; font-size: 0.9rem; margin-bottom: 28px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fg { margin-bottom: 16px; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
    input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
    textarea { min-height: 100px; resize: vertical; }
    button { background: #0070f3; color: #fff; padding: 10px 28px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Create Your Professional Profile</h1>
  <p class="subtitle">This profile will be visible to recruiters and collaborators on the platform.</p>
  <form method="post" action="#">
    <div class="fg">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" required>
    </div>
    <div class="row2">
      <div class="fg">
        <label for="professionalTitle">Professional Title</label>
        <input type="text" id="professionalTitle" name="professionalTitle" placeholder="e.g. Senior Software Engineer">
      </div>
      <div class="fg">
        <label for="currentEmployer">Current Employer / Organization</label>
        <input type="text" id="currentEmployer" name="currentEmployer">
      </div>
    </div>
    <div class="fg">
      <label for="bio">Professional Bio (150 words max)</label>
      <textarea id="bio" name="bio" placeholder="Brief overview of your background and expertise…"></textarea>
    </div>
    <div class="row2">
      <div class="fg">
        <label for="personalWebsite">Personal Website URL</label>
        <input type="url" id="personalWebsite" name="personalWebsite" placeholder="https://yourname.dev">
      </div>
      <div class="fg">
        <label for="linkedinUrl">LinkedIn Profile URL</label>
        <input type="url" id="linkedinUrl" name="linkedinUrl" placeholder="https://linkedin.com/in/yourname">
      </div>
    </div>
    <div class="fg">
      <label for="technicalSkills">Technical Skills (comma-separated)</label>
      <input type="text" id="technicalSkills" name="technicalSkills" placeholder="JavaScript, Python, AWS…">
    </div>
    <div class="fg">
      <label for="yearsOfExperience">Years of Professional Experience</label>
      <input type="number" id="yearsOfExperience" name="yearsOfExperience" min="0" max="50">
    </div>
    <button type="submit">Save Profile</button>
  </form>
</body>
</html>
