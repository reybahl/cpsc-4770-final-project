<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Insurance Enrollment</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 660px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .subtitle { color: #555; font-size: 0.9rem; margin-bottom: 28px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .fg { margin-bottom: 16px; }
    fieldset { border: 1px solid #ddd; border-radius: 6px; padding: 18px; margin-bottom: 24px; }
    legend { font-weight: 700; font-size: 0.95rem; padding: 0 8px; color: #333; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
    .radio-group { display: flex; gap: 24px; margin-top: 4px; }
    .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 6px; }
    button { background: #059669; color: #fff; padding: 10px 28px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Health Insurance Enrollment</h1>
  <p class="subtitle">Open Enrollment Period — ClearPath Health Plan</p>
  <form method="post" action="#">

    <fieldset>
      <legend>Member Information</legend>
      <div class="row2">
        <div class="fg">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" required>
        </div>
        <div class="fg">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" required>
        </div>
      </div>
      <div class="row2">
        <div class="fg">
          <label for="dateOfBirth">Date of Birth</label>
          <input type="date" id="dateOfBirth" name="dateOfBirth" required>
        </div>
        <div class="fg">
          <label for="ssnLast4">SSN – Last 4 Digits</label>
          <input type="text" id="ssnLast4" name="ssnLast4" maxlength="4" placeholder="XXXX">
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Plan Selection</legend>
      <div class="row2">
        <div class="fg">
          <label for="planType">Plan Type</label>
          <select id="planType" name="planType" required>
            <option value="">Select…</option>
            <option value="hmo">HMO – Health Maintenance Organization</option>
            <option value="ppo">PPO – Preferred Provider Organization</option>
            <option value="epo">EPO – Exclusive Provider Organization</option>
            <option value="hdhp">HDHP – High-Deductible Health Plan</option>
          </select>
        </div>
        <div class="fg">
          <label for="deductiblePreference">Deductible Preference</label>
          <select id="deductiblePreference" name="deductiblePreference">
            <option value="">Select…</option>
            <option value="low-deductible">Low deductible / higher premiums</option>
            <option value="high-deductible">High deductible / lower premiums</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label for="primaryCarePhysician">Preferred Primary Care Physician (optional)</label>
        <input type="text" id="primaryCarePhysician" name="primaryCarePhysician" placeholder="Doctor's full name">
      </div>
      <div class="row2">
        <div class="fg">
          <label for="numberOfDependents">Number of Dependents to Cover</label>
          <input type="number" id="numberOfDependents" name="numberOfDependents" min="0" max="10">
        </div>
        <div class="fg">
          <label for="coverageStartDate">Coverage Effective Date</label>
          <input type="date" id="coverageStartDate" name="coverageStartDate" required>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Emergency Contact</legend>
      <div class="row2">
        <div class="fg">
          <label for="emergencyContactName">Emergency Contact Name</label>
          <input type="text" id="emergencyContactName" name="emergencyContactName" required>
        </div>
        <div class="fg">
          <label for="emergencyContactPhone">Emergency Contact Phone</label>
          <input type="tel" id="emergencyContactPhone" name="emergencyContactPhone" required>
        </div>
      </div>
      <div class="fg">
        <label for="emergencyContactRelationship">Relationship to Enrollee</label>
        <input type="text" id="emergencyContactRelationship" name="emergencyContactRelationship" placeholder="e.g. Spouse, Parent, Sibling">
      </div>
      <div class="fg">
        <label>Tobacco User?</label>
        <div class="radio-group">
          <label><input type="radio" name="tobaccoUser" value="yes"> Yes</label>
          <label><input type="radio" name="tobaccoUser" value="no"> No</label>
        </div>
      </div>
    </fieldset>

    <button type="submit">Enroll Now</button>
  </form>
</body>
</html>
