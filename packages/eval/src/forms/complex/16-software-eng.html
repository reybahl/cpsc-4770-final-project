<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Software Engineer Application</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 660px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .subtitle { color: #555; font-size: 0.9rem; margin-bottom: 28px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fg { margin-bottom: 16px; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
    .hint { font-size: 0.78rem; color: #666; margin-top: 2px; }
    input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
    textarea { min-height: 110px; resize: vertical; }
    button { background: #111; color: #fff; padding: 10px 28px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Software Engineer — Application</h1>
  <p class="subtitle">Nexus Technology Group · Remote-first · Full-time</p>
  <form method="post" action="#">
    <div class="fg">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" required>
    </div>
    <div class="row2">
      <div class="fg">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="fg">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone">
      </div>
    </div>
    <div class="row2">
      <div class="fg">
        <label for="githubUrl">GitHub Profile URL</label>
        <input type="url" id="githubUrl" name="githubUrl" placeholder="https://github.com/username">
      </div>
      <div class="fg">
        <label for="portfolioUrl">Portfolio / Website URL</label>
        <input type="url" id="portfolioUrl" name="portfolioUrl" placeholder="https://yourname.dev">
      </div>
    </div>
    <div class="row2">
      <div class="fg">
        <label for="currentEmployer">Current Company</label>
        <input type="text" id="currentEmployer" name="currentEmployer">
      </div>
      <div class="fg">
        <label for="currentRole">Current Role / Title</label>
        <input type="text" id="currentRole" name="currentRole">
      </div>
    </div>
    <div class="row2">
      <div class="fg">
        <label for="primaryLanguages">Primary Programming Languages</label>
        <input type="text" id="primaryLanguages" name="primaryLanguages" placeholder="e.g. TypeScript, Python, Go">
      </div>
      <div class="fg">
        <label for="yearsExperience">Years of Professional Experience</label>
        <input type="number" id="yearsExperience" name="yearsExperience" min="0">
      </div>
    </div>
    <div class="fg">
      <label for="openSourceContributions">Open Source Contributions</label>
      <p class="hint">Describe any open source projects you've contributed to or maintained.</p>
      <textarea id="openSourceContributions" name="openSourceContributions"></textarea>
    </div>
    <div class="fg">
      <label for="whyThisRole">Why are you interested in this role?</label>
      <textarea id="whyThisRole" name="whyThisRole"></textarea>
    </div>
    <div class="row2">
      <div class="fg">
        <label for="salaryExpectation">Expected Annual Compensation (USD)</label>
        <input type="text" id="salaryExpectation" name="salaryExpectation" placeholder="e.g. 130000">
      </div>
      <div class="fg">
        <label for="availableStartDate">Earliest Available Start Date</label>
        <input type="date" id="availableStartDate" name="availableStartDate">
      </div>
    </div>
    <button type="submit">Submit Application</button>
  </form>
</body>
</html>
