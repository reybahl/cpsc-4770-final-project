<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Setup Wizard</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .progress { display: flex; gap: 8px; margin-bottom: 28px; }
    .step-dot { flex: 1; height: 4px; border-radius: 2px; background: #e5e7eb; }
    .step-dot.active { background: #0070f3; }
    .step-dot.done   { background: #10b981; }
    .step { display: none; }
    .step.visible { display: block; }
    .step-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #333; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fg { margin-bottom: 16px; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
    textarea { min-height: 100px; resize: vertical; }
    .nav { display: flex; justify-content: space-between; margin-top: 24px; }
    .btn-back { background: #f3f4f6; color: #333; padding: 9px 22px; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; font-size: 0.93rem; }
    .btn-next { background: #0070f3; color: #fff; padding: 9px 22px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.93rem; }
    .btn-submit { background: #10b981; color: #fff; padding: 9px 22px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.93rem; }
  </style>
</head>
<body>
  <h1>Profile Setup</h1>
  <div class="progress">
    <div class="step-dot active" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
    <div class="step-dot" id="dot-3"></div>
    <div class="step-dot" id="dot-4"></div>
  </div>

  <form method="post" action="#">

    <!-- Step 1: Personal -->
    <div class="step visible" id="step-1">
      <div class="step-title">Step 1 of 4 — Personal Information</div>
      <div class="row2">
        <div class="fg">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" required>
        </div>
        <div class="fg">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" required>
        </div>
      </div>
      <div class="fg">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="fg">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone">
      </div>
      <div class="nav">
        <span></span>
        <button type="button" class="btn-next" onclick="goTo(2)">Next →</button>
      </div>
    </div>

    <!-- Step 2: Education -->
    <div class="step" id="step-2">
      <div class="step-title">Step 2 of 4 — Education</div>
      <div class="fg">
        <label for="universityName">University / College</label>
        <input type="text" id="universityName" name="universityName">
      </div>
      <div class="row2">
        <div class="fg">
          <label for="degreeType">Degree Type</label>
          <select id="degreeType" name="degreeType">
            <option value="">Select…</option>
            <option value="associate">Associate</option>
            <option value="bachelor">Bachelor's</option>
            <option value="master">Master's</option>
            <option value="doctoral">Doctoral</option>
          </select>
        </div>
        <div class="fg">
          <label for="fieldOfStudy">Field of Study</label>
          <input type="text" id="fieldOfStudy" name="fieldOfStudy">
        </div>
      </div>
      <div class="fg">
        <label for="graduationYear">Graduation Year</label>
        <input type="text" id="graduationYear" name="graduationYear" placeholder="YYYY">
      </div>
      <div class="nav">
        <button type="button" class="btn-back" onclick="goTo(1)">← Back</button>
        <button type="button" class="btn-next" onclick="goTo(3)">Next →</button>
      </div>
    </div>

    <!-- Step 3: Experience -->
    <div class="step" id="step-3">
      <div class="step-title">Step 3 of 4 — Work Experience</div>
      <div class="row2">
        <div class="fg">
          <label for="currentCompany">Current Company</label>
          <input type="text" id="currentCompany" name="currentCompany">
        </div>
        <div class="fg">
          <label for="currentRole">Current Role</label>
          <input type="text" id="currentRole" name="currentRole">
        </div>
      </div>
      <div class="row2">
        <div class="fg">
          <label for="employmentStartDate">Employment Start Date</label>
          <input type="text" id="employmentStartDate" name="employmentStartDate" placeholder="MM/YYYY">
        </div>
        <div class="fg">
          <label for="totalYearsExperience">Total Years of Experience</label>
          <input type="number" id="totalYearsExperience" name="totalYearsExperience" min="0">
        </div>
      </div>
      <div class="nav">
        <button type="button" class="btn-back" onclick="goTo(2)">← Back</button>
        <button type="button" class="btn-next" onclick="goTo(4)">Next →</button>
      </div>
    </div>

    <!-- Step 4: Skills -->
    <div class="step" id="step-4">
      <div class="step-title">Step 4 of 4 — Skills &amp; Summary</div>
      <div class="fg">
        <label for="technicalSkills">Technical Skills (comma-separated)</label>
        <input type="text" id="technicalSkills" name="technicalSkills" placeholder="e.g. JavaScript, Python, React">
      </div>
      <div class="fg">
        <label for="professionalSummary">Professional Summary</label>
        <textarea id="professionalSummary" name="professionalSummary" placeholder="Brief overview of your background…"></textarea>
      </div>
      <div class="nav">
        <button type="button" class="btn-back" onclick="goTo(3)">← Back</button>
        <button type="submit" class="btn-submit">Submit Profile</button>
      </div>
    </div>

  </form>

  <script>
    function goTo(n) {
      document.querySelectorAll('.step').forEach((s, i) => {
        s.classList.toggle('visible', i + 1 === n);
      });
      document.querySelectorAll('.step-dot').forEach((d, i) => {
        d.classList.toggle('active', i + 1 === n);
        d.classList.toggle('done', i + 1 < n);
      });
    }
  </script>
</body>
</html>
