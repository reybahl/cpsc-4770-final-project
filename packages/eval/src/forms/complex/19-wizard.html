<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Setup Wizard</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .progress { display: flex; gap: 8px; margin-bottom: 28px; }
    .step-dot { flex: 1; height: 4px; border-radius: 2px; background: #e5e7eb; }
    .step-dot.active { background: #0070f3; }
    .step-dot.done   { background: #10b981; }
    .step { display: none; }
    .step.visible { display: block; }
    .step-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #333; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fg { margin-bottom: 16px; }
    label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
    textarea { min-height: 100px; resize: vertical; }
    .nav { display: flex; justify-content: space-between; margin-top: 24px; }
    .btn-back { background: #f3f4f6; color: #333; padding: 9px 22px; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; font-size: 0.93rem; }
    .btn-next { background: #0070f3; color: #fff; padding: 9px 22px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.93rem; }
    .btn-submit { background: #10b981; color: #fff; padding: 9px 22px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.93rem; }
  </style>
</head>
<body>
  <h1>Profile Setup</h1>
  <div class="progress">
    <div class="step-dot active" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
    <div class="step-dot" id="dot-3"></div>
    <div class="step-dot" id="dot-4"></div>
  </div>

  <form method="post" action="#">
    <!-- Initial DOM: step 1 only. Steps 2–4 load via fetch when the user advances (not in this document). -->
    <div id="steps-root">
      <div class="step visible" id="step-1">
        <div class="step-title">Step 1 of 4 — Personal Information</div>
        <div class="row2">
          <div class="fg">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" required>
          </div>
          <div class="fg">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" required>
          </div>
        </div>
        <div class="fg">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="fg">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone">
        </div>
        <div class="nav">
          <span></span>
          <button type="button" class="btn-next" onclick="goTo(2)">Next →</button>
        </div>
      </div>
    </div>
  </form>

  <script>
    (function () {
      var mounted = { 1: true, 2: false, 3: false, 4: false };
      var root = document.getElementById("steps-root");
      var stepUrls = {
        2: "19-wizard-step-2.html",
        3: "19-wizard-step-3.html",
        4: "19-wizard-step-4.html",
      };

      function updateDots(n) {
        document.querySelectorAll(".step-dot").forEach(function (d, i) {
          d.classList.toggle("active", i + 1 === n);
          d.classList.toggle("done", i + 1 < n);
        });
      }

      function showStep(n) {
        root.querySelectorAll(".step").forEach(function (s) {
          var id = s.id || "";
          var num = parseInt(id.replace("step-", ""), 10);
          s.classList.toggle("visible", num === n);
        });
        updateDots(n);
      }

      async function ensureMounted(n) {
        if (n === 1 || mounted[n]) return;
        var url = stepUrls[n];
        if (!url) return;
        var res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load step " + n + ": " + res.status);
        var html = await res.text();
        root.insertAdjacentHTML("beforeend", html);
        mounted[n] = true;
      }

      window.goTo = async function (n) {
        if (n < 1 || n > 4) return;
        try {
          await ensureMounted(n);
          showStep(n);
        } catch (e) {
          console.error(e);
        }
      };
    })();
  </script>
</body>
</html>
